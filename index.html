<script>
// =====================================================================
//  CONFIGURACIÓN — cambia solo esta URL
// =====================================================================
const GAS_URL = "https://script.google.com/macros/s/AKfycbygr0RB4BTMgfrupLVyfGaGnrag2v9F72rhPMHuM7hW1GXeq7afUl1icv1jtdoRBv84/exec";

// =====================================================================
//  ESTADO GLOBAL
// =====================================================================
let bancosCustom = []; // se carga desde GAS al iniciar

// =====================================================================
//  COMUNICACIÓN CON GAS
// =====================================================================
async function gasCall(payload) {
  const res = await fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify(payload)
  });
  if (!res.ok) throw new Error("HTTP " + res.status);
  return res.json();
}

async function cargarLogos() {
  try {
    const data = await gasCall({ action: "getLogos" });
    bancosCustom = (data && data.bancos) ? data.bancos : [];
  } catch(e) {
    console.warn("No se pudieron cargar logos del servidor:", e.message);
    bancosCustom = [];
  }
}

async function guardarLogos() {
  try {
    await gasCall({ action: "saveLogos", bancos: bancosCustom });
  } catch(e) {
    console.error("Error al guardar logos:", e.message);
  }
}

// =====================================================================
//  LOGOS DE BANCOS

function getBankLogo(nombre) {
  if (!nombre) return iconoBancoGenerico();
  const k = nombre.toLowerCase().trim();
  // Buscar en personalizados primero
  const custom = bancosCustom.find(b => {
    const bn = b.nombre.toLowerCase().trim();
    return bn === k || k.includes(bn) || bn.includes(k);
  });
  if (custom) return custom.logo;
  // Predefinidos
  if (k.includes("bcp")) return bancosMap.bcp;
  if (k.includes("interbank")) return bancosMap.interbank;
  if (k.includes("yape")) return bancosMap.yape;
  if (k.includes("caja") || k.includes("huancayo")) return bancosMap.caja;
  return iconoBancoGenerico();
}

function iconoBancoGenerico() {
  return "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%236b7280'%3E%3Cpath d='M4 10v7h3v-7H4zm6 0v7h3v-7h-3zM2 22h19v-3H2v3zm14-12v7h3v-7h-3zM11.5 1L2 6v2h19V6l-9.5-5z'/%3E%3C/svg%3E";
}

function escapeHtml(str) {
  if (!str) return "";
  return String(str).replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');
}

// =====================================================================
function renderBancosCustomList() {
  const container = document.getElementById("bancosCustomList");
  if (!bancosCustom.length) {
    container.innerHTML = '<span style="color:#475569;font-size:0.72rem;">Sin bancos personalizados aún.</span>';
    return;
  }
  container.innerHTML = bancosCustom.map((b, i) => `
    <div class="banco-custom-chip">
      <img src="${b.logo}" alt="${escapeHtml(b.nombre)}">
      <span>${escapeHtml(b.nombre)}</span>
      <button class="banco-chip-del" data-idx="${i}" title="Eliminar">✕</button>
    </div>
  `).join("");
  container.querySelectorAll(".banco-chip-del").forEach(btn => {
    btn.addEventListener("click", async () => {
      bancosCustom.splice(parseInt(btn.dataset.idx), 1);
      renderBancosCustomList();
      renderAdminLogosPanel();
      renderInfografia();
      await guardarLogos();
    });
  });
}

function renderAdminLogosPanel() {
  const grid = document.getElementById("adminLogosGrid");
  if (!grid) return;
  if (!bancosCustom.length) {
    grid.innerHTML = '<div class="admin-logo-empty">Sin logos subidos aún.</div>';
    return;
  }
  grid.innerHTML = bancosCustom.map(b => `
    <div class="admin-logo-card">
      <img src="${b.logo}" alt="${escapeHtml(b.nombre)}">
      <span>${escapeHtml(b.nombre)}</span>
    </div>
  `).join("");
}

document.getElementById("bancoLogoInput").addEventListener("change", function() {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById("bancoPreviewImg");
    img.src = e.target.result;
    img.style.display = "inline-block";
  };
  reader.readAsDataURL(file);
});

document.getElementById("btnAgregarBanco").addEventListener("click", async function() {
  const nombre = document.getElementById("bancoNombreInput").value.trim();
  const previewImg = document.getElementById("bancoPreviewImg");
  const logoInput = document.getElementById("bancoLogoInput");

  if (!nombre) { alert("Escribe el nombre del banco."); return; }
  if (!previewImg.src || previewImg.style.display === "none") {
    alert("Selecciona un logo para el banco."); return;
  }

  const key = nombre.toLowerCase().replace(/\s+/g, "");
  if (bancosCustom.find(b => b.key === key)) {
    alert("Ya existe un banco con ese nombre."); return;
  }

  this.disabled = true;
  this.textContent = "Guardando...";

  bancosCustom.push({ nombre, key, logo: previewImg.src });
  renderBancosCustomList();
  renderAdminLogosPanel();
  renderInfografia();
  await guardarLogos();

  // Limpiar form
  document.getElementById("bancoNombreInput").value = "";
  logoInput.value = "";
  previewImg.src = "";
  previewImg.style.display = "none";
  this.disabled = false;
  this.textContent = "➕ Agregar banco";
});

function getBancosDatalist() {
  const predefinidos = ["BCP","Interbank","Yape","Caja Huancayo","BBVA","Scotiabank","BanBif","Banco de la Nacion","Mibanco","Pichincha"];
  const custom = bancosCustom.map(b => b.nombre);
  const todos = [...new Set([...predefinidos, ...custom])];
  return `<datalist id="bancosSugeridos">${todos.map(b => `<option value="${b}">`).join("")}</datalist>`;
}

function renderCuentasEditor() {
  const empresa = empresasState[empresaActual];
  const container = document.getElementById("cuentasEditor");
  container.innerHTML = getBancosDatalist();

  empresa.cuentas.forEach((c, idx) => {
    const div = document.createElement("div");
    div.className = "cuenta-editor-item";
    div.innerHTML = `
      <button class="btn-eliminar-cuenta" data-idx="${idx}">✕</button>
      <div class="grid-cuenta-editor">
        <div class="field-small"><label>Banco</label><input type="text" list="bancosSugeridos" data-field="banco" data-idx="${idx}" value="${escapeHtml(c.banco)}"></div>
        <div class="field-small"><label>Tipo</label><input type="text" data-field="tipo" data-idx="${idx}" value="${escapeHtml(c.tipo)}"></div>
        <div class="field-small"><label>Moneda</label><input type="text" data-field="moneda" data-idx="${idx}" value="${escapeHtml(c.moneda)}"></div>
        <div class="field-small"><label>Número</label><input type="text" data-field="numero" data-idx="${idx}" value="${escapeHtml(c.numero)}"></div>
        <div class="field-small" style="grid-column:1/-1"><label>CCI</label><input type="text" data-field="cci" data-idx="${idx}" value="${escapeHtml(c.cci)}"></div>
        <div class="field-small" style="grid-column:1/-1"><label>Titular</label><input type="text" data-field="titular" data-idx="${idx}" value="${escapeHtml(c.titular)}"></div>
        <div class="field-small" style="grid-column:1/-1"><label>Observación</label><textarea data-field="observacion" data-idx="${idx}">${escapeHtml(c.observacion)}</textarea></div>
      </div>`;
    container.appendChild(div);
  });

  container.querySelectorAll("input,textarea").forEach(el => {
    const actualizar = e => {
      empresasState[empresaActual].cuentas[parseInt(e.target.dataset.idx)][e.target.dataset.field] = e.target.value;
      renderInfografia();
      updateStats();
    };
    el.addEventListener("input", actualizar);
    el.addEventListener("change", actualizar);
  });

  container.querySelectorAll(".btn-eliminar-cuenta").forEach(btn => {
    btn.addEventListener("click", () => {
      empresasState[empresaActual].cuentas.splice(parseInt(btn.dataset.idx), 1);
      renderCuentasEditor();
      renderInfografia();
      updateStats();
    });
  });
}

function renderInfografia() {
  const empresa = empresasState[empresaActual];
  const logo = LOGOS_EMPRESA[empresaActual];

  const cuentasHTML = empresa.cuentas.map(c => {
    const logoSrc = getBankLogo(c.banco);
    const obsHTML = c.observacion ? `<div class="obs-tag">📌 ${escapeHtml(c.observacion)}</div>` : "";
    return `
      <div class="cuenta-card">
        <img src="${logoSrc}" alt="${escapeHtml(c.banco)}" style="width:44px;height:44px;object-fit:contain;">
        <div class="cuenta-info">
          <div class="cuenta-banco">${escapeHtml(c.banco)}</div>
          <div class="cuenta-titular-label">${escapeHtml(c.titular)}</div>
          <div class="cuenta-detalle">
            <span><strong>Tipo</strong>${escapeHtml(c.tipo)}</span>
            <span><strong>Moneda</strong>${escapeHtml(c.moneda)}</span>
            ${c.numero ? `<span><strong>N° Cuenta</strong>${escapeHtml(c.numero)}</span>` : ""}
            ${c.cci ? `<span><strong>CCI</strong>${escapeHtml(c.cci)}</span>` : ""}
          </div>
          ${obsHTML}
        </div>
      </div>`;
  }).join("");

  document.getElementById("infografiaPreview").innerHTML = `
    <div class="${empresa.tema}">
      <div class="infografia-header">
        <div class="logo-empresa">
          <img src="${logo}" alt="${escapeHtml(empresa.nombre)}" onerror="this.style.display='none'">
        </div>
        <h2>${escapeHtml(empresa.nombre)}</h2>
        <div class="subtitulo">${escapeHtml(empresa.subtitulo)}</div>
      </div>
      <div class="info-body">
        <div class="cuentas-titulo">🏦 Cuentas Bancarias Habilitadas</div>
        ${cuentasHTML}
      </div>
      <div class="infografia-footer">
        Documento generado por LexSuite · ${new Date().toLocaleDateString("es-PE",{day:"2-digit",month:"long",year:"numeric"})}
      </div>
    </div>`;
}

// =====================================================================
//  BADGES Y SELECTOR
// =====================================================================
function renderBadges() {
  const container = document.getElementById("empresaBadges");
  const empresas = [
    { key:"egida",    label:"Egida Jurídica", cls:"badge-egida" },
    { key:"labase",   label:"La Base Cowork", cls:"badge-labase" },
    { key:"finacorp", label:"Finacorp",        cls:"badge-finacorp" }
  ];
  container.innerHTML = empresas.map(e => `
    <div class="empresa-badge ${e.cls} ${empresaActual === e.key ? "active" : ""}" data-key="${e.key}">${e.label}</div>
  `).join("");
  container.querySelectorAll(".empresa-badge").forEach(badge => {
    badge.addEventListener("click", () => {
      empresaActual = badge.dataset.key;
      document.getElementById("empresaSelector").value = empresaActual;
      renderBadges();
      renderCuentasEditor();
      renderInfografia();
      updateStats();
    });
  });
}

document.getElementById("empresaSelector").addEventListener("change", e => {
  empresaActual = e.target.value;
  renderBadges();
  renderCuentasEditor();
  renderInfografia();
  updateStats();
});

document.getElementById("agregarCuentaBtn").addEventListener("click", () => {
  empresasState[empresaActual].cuentas.push({ banco:"Nuevo Banco", tipo:"Cuenta Corriente", moneda:"PEN", numero:"", cci:"", titular:"", observacion:"" });
  renderCuentasEditor();
  renderInfografia();
  updateStats();
});

document.getElementById("exportBtn").addEventListener("click", () => {
  const target = document.getElementById("infografiaPreview").firstElementChild;
  if (!target) return;
  html2canvas(target, { scale:2, backgroundColor:null, useCORS:true }).then(canvas => {
    const link = document.createElement("a");
    link.download = `infografia-${empresaActual}-${Date.now()}.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
  });
});

function updateStats() {
  document.getElementById("stat-cuentas").textContent = empresasState[empresaActual].cuentas.length;
}

// =====================================================================
//  ARRANQUE — carga logos del servidor PRIMERO, luego muestra la app
// =====================================================================
(async function arrancar() {
  await cargarLogos();

  // Ocultar loading, mostrar app
  document.getElementById("loadingOverlay").style.display = "none";
  document.getElementById("appContainer").style.display = "block";

  // Render inicial
  renderBancosCustomList();
  renderAdminLogosPanel();
  renderBadges();
  renderCuentasEditor();
  renderInfografia();
  updateStats();
})();
</script>
</body>
</html>
