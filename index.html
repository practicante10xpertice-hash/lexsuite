<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infografía de Pago · LexSuite</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

body {
  font-family:'Inter','Segoe UI',sans-serif;
  background: linear-gradient(135deg,#0d1117 0%,#161b27 40%,#0f1923 100%);
  min-height: 100vh;
  color: #fff;
}

/* --- LOGIN --- */
.login-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.login-card {
  background: rgba(20, 25, 40, 0.95);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 32px;
  padding: 32px;
  width: 360px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}
.login-card h2 {
  text-align: center;
  margin-bottom: 24px;
  font-weight: 700;
}
.login-card input {
  width: 100%;
  padding: 12px 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  color: white;
  margin-bottom: 16px;
}
.login-card button {
  width: 100%;
  background: linear-gradient(135deg,#7c6af7,#5b4fcf);
  border: none;
  padding: 12px;
  border-radius: 40px;
  font-weight: bold;
  cursor: pointer;
  color: white;
}
.error-msg {
  color: #f87171;
  font-size: 0.75rem;
  margin-top: 12px;
  text-align: center;
}
.logout-bar {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
}
.logout-bar span {
  background: #1e293b;
  padding: 6px 14px;
  border-radius: 30px;
  font-size: 0.75rem;
}
.logout-btn {
  background: rgba(255,255,255,0.1);
  border: none;
  padding: 6px 14px;
  border-radius: 30px;
  cursor: pointer;
  color: #f1f5f9;
}
.admin-section {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  padding: 20px;
  margin-bottom: 28px;
}
.admin-section h3 {
  margin-bottom: 16px;
}
.admin-layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 280px;
  gap: 18px;
  align-items: start;
}
.admin-main {
  min-width: 0;
}
.user-form {
  display: grid;
  grid-template-columns: 1.35fr 1fr 1fr 0.95fr auto;
  gap: 12px;
  margin-bottom: 20px;
  align-items: center;
}
.user-form input, .user-form select {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 10px 14px;
  border-radius: 40px;
  color: white;
  min-width: 0;
}
.user-form select {
  color-scheme: dark;
  -webkit-appearance: none;
  -moz-appearance: none;
  appearance: none;
  background-image:
    linear-gradient(45deg, transparent 50%, rgba(255,255,255,0.85) 50%),
    linear-gradient(135deg, rgba(255,255,255,0.85) 50%, transparent 50%);
  background-position:
    calc(100% - 18px) calc(50% - 3px),
    calc(100% - 12px) calc(50% - 3px);
  background-size: 6px 6px, 6px 6px;
  background-repeat: no-repeat;
  padding-right: 34px;
}
.user-form select option {
  background: #1e2535;
  color: #e2e8f0;
}
.user-list {
  overflow-x: auto;
}
.user-list table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}
.user-list th, .user-list td {
  text-align: left;
  padding: 10px 8px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  vertical-align: middle;
}
.user-list th:nth-child(1), .user-list td:nth-child(1) { width: 34%; }
.user-list th:nth-child(2), .user-list td:nth-child(2) { width: 20%; }
.user-list th:nth-child(3), .user-list td:nth-child(3) { width: 22%; }
.user-list th:nth-child(4), .user-list td:nth-child(4) { width: 14%; }
.user-list th:nth-child(5), .user-list td:nth-child(5) { width: 10%; text-align: right; }
.user-password-text {
  display: inline-block;
  font-family: 'Inter','Segoe UI',sans-serif;
  letter-spacing: 0.2px;
  color: #e2e8f0;
}
.admin-logos-panel {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px;
  padding: 14px;
}
.admin-logos-panel h4 {
  font-size: 0.82rem;
  font-weight: 700;
  color: #cbd5e1;
  margin-bottom: 12px;
}
.admin-logos-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.admin-logo-card {
  min-height: 88px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 10px 8px;
  text-align: center;
}
.admin-logo-card img {
  max-width: 58px;
  max-height: 42px;
  object-fit: contain;
  margin-bottom: 8px;
}
.admin-logo-card span {
  font-size: 0.66rem;
  line-height: 1.2;
  color: #cbd5e1;
  word-break: break-word;
}
.admin-logo-empty {
  font-size: 0.72rem;
  color: #64748b;
}
.delete-user-btn {
  background: rgba(220,38,38,0.2);
  border: none;
  padding: 4px 12px;
  border-radius: 30px;
  color: #fca5a5;
  cursor: pointer;
}
@media (max-width: 1080px) {
  .admin-layout {
    grid-template-columns: 1fr;
  }
  .user-form {
    grid-template-columns: 1fr 1fr;
  }
}
@media (max-width: 720px) {
  .user-form {
    grid-template-columns: 1fr;
  }
}

.pg-wrap {
  min-height: 100vh;
  padding: 32px 24px 48px;
  position: relative;
  overflow: hidden;
}

.pg-wrap::before {
  content:'';
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 70% 20%, rgba(99,74,183,0.12) 0%, transparent 70%),
    radial-gradient(ellipse 50% 50% at 10% 80%, rgba(29,158,117,0.08) 0%, transparent 65%);
  pointer-events:none;
}

.deco-dots {
  position: absolute;
  top: 0; right: 0;
  width: 320px; height: 320px;
  background-image: radial-gradient(rgba(124,106,247,0.15) 1px, transparent 1px);
  background-size: 24px 24px;
  pointer-events: none;
  border-radius: 0 0 0 0;
  opacity: 0.5;
}

.pg-container { max-width: 1400px; margin: 0 auto; position: relative; }

.pg-header { margin-bottom: 28px; text-align: center; }
.pg-header h1 {
  font-size: 1.7rem; font-weight: 800; letter-spacing: -0.3px;
  background: linear-gradient(135deg,#e2e8f0 0%,#94a3b8 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.pg-header p { color: #64748b; font-size: 0.85rem; margin-top: 6px; }

.stat-strip { display: flex; gap: 12px; margin-bottom: 28px; }
.stat-card {
  flex: 1;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 14px;
  padding: 12px 16px;
  display: flex; align-items: center; gap: 10px;
}
.stat-icon {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
}
.stat-card .stat-label { font-size: 0.65rem; color: #475569; text-transform: uppercase; letter-spacing: 0.8px; }
.stat-card .stat-value { font-size: 1rem; font-weight: 700; color: #e2e8f0; }

.pg-dashboard { display: grid; grid-template-columns: 420px 1fr; gap: 28px; align-items: start; }

.editor-panel {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  padding: 24px;
  backdrop-filter: blur(12px);
  max-height: calc(100vh - 180px);
  overflow-y: auto;
}
.editor-panel::-webkit-scrollbar { width: 4px; }
.editor-panel::-webkit-scrollbar-track { background: transparent; }
.editor-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

.selector-section { margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.07); }
.selector-section label {
  font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
  color: #475569; display: block; margin-bottom: 8px; letter-spacing: 1px;
}
.empresa-selector {
  width: 100%; padding: 12px 16px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  font-family: 'Inter',sans-serif; font-size: 0.9rem; font-weight: 600;
  background: rgba(255,255,255,0.06); color: #e2e8f0; cursor: pointer;
  transition: all 0.2s;
  appearance: auto;
}
.empresa-selector:focus { outline: none; border-color: #7c6af7; }
.empresa-selector option { background: #1e2535; color: #e2e8f0; }

.empresa-badges { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.empresa-badge {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 11px;
  border-radius: 30px; font-size: 0.67rem; font-weight: 700;
  cursor: pointer; border: 1.5px solid transparent; transition: all 0.2s;
}
.empresa-badge img { width: 20px; height: 20px; object-fit: contain; border-radius: 3px; }
.badge-egida   { background: rgba(212,175,55,0.12); color: #d4af37; }
.badge-egida.active   { border-color: #d4af37; }
.badge-labase  { background: rgba(255,140,0,0.12); color: #ff8c00; }
.badge-labase.active  { border-color: #ff8c00; }
.badge-finacorp{ background: rgba(26,115,232,0.12); color: #60a5fa; }
.badge-finacorp.active{ border-color: #60a5fa; }

.cuentas-section h3 {
  font-size: 0.83rem; font-weight: 700; color: #cbd5e1;
  margin-bottom: 14px; display: flex; align-items: center; gap: 6px;
}
.cuenta-editor-item {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 16px; padding: 14px; margin-bottom: 12px; position: relative;
}
.btn-eliminar-cuenta {
  position: absolute; top: 10px; right: 10px;
  background: rgba(220,38,38,0.15); border: none;
  width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
  font-size: 0.65rem; color: #f87171; font-weight: bold;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.btn-eliminar-cuenta:hover { background: rgba(220,38,38,0.3); }

.grid-cuenta-editor { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.field-small label {
  font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
  color: #475569; display: block; margin-bottom: 4px;
}
.field-small input,
.field-small textarea {
  width: 100%; padding: 8px 10px;
  border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
  font-family: 'Inter',sans-serif; font-size: 0.73rem;
  background: rgba(255,255,255,0.05); color: #e2e8f0;
  transition: border-color 0.2s;
}
.field-small input:focus,
.field-small textarea:focus { outline: none; border-color: #7c6af7; }
.field-small textarea { resize: vertical; min-height: 50px; }

.btn-agregar-cuenta {
  background: rgba(124,106,247,0.15);
  border: 1px solid rgba(124,106,247,0.3);
  padding: 10px 18px; border-radius: 30px;
  font-size: 0.7rem; font-weight: 700;
  cursor: pointer; margin-top: 6px; width: 100%; color: #a78bfa;
  transition: background 0.2s;
}
.btn-agregar-cuenta:hover { background: rgba(124,106,247,0.25); }

.preview-panel {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 24px; padding: 20px;
}
.preview-header { display: flex; justify-content: flex-end; margin-bottom: 18px; }
.btn-download {
  background: linear-gradient(135deg,#7c6af7,#5b4fcf);
  border: none; padding: 11px 28px; border-radius: 40px; color: white;
  font-weight: 700; font-size: 0.83rem; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  font-family: 'Inter',sans-serif;
  box-shadow: 0 4px 16px rgba(124,106,247,0.3);
  transition: opacity 0.2s;
}
.btn-download:hover { opacity: 0.9; }

.infografia-wrapper { border-radius: 28px; display: flex; justify-content: center; }

/* Temas con logos en tarjetas */
.tema-egida, .tema-labase, .tema-finacorp { border-radius:24px; overflow:hidden; width:560px; }
.tema-egida { background:#08080f; color:#fff; }
.tema-labase { background:#f5c800; color:#1a1a1a; }
.tema-finacorp { background:#fff; color:#1a1a2e; }

.tema-egida .infografia-header { background:linear-gradient(160deg,#08080f 0%,#111121 100%); padding:32px 28px 24px; text-align:center; border-bottom:1px solid rgba(212,175,55,0.2); }
.tema-labase .infografia-header { background:linear-gradient(160deg,#f5c800 0%,#e6b800 100%); padding:32px 28px 24px; text-align:center; border-bottom:2px solid rgba(0,0,0,0.12); }
.tema-finacorp .infografia-header { background:linear-gradient(160deg,#0d47a1 0%,#1a73e8 60%,#2196f3 100%); padding:32px 28px 24px; text-align:center; }

.tema-egida .logo-empresa, .tema-labase .logo-empresa { margin:0 auto 16px; width:110px; height:90px; border-radius:0; display:flex; align-items:center; justify-content:center; overflow:visible; background:transparent; }
.tema-finacorp .logo-empresa { margin:0 auto 16px; width:180px; height:70px; border-radius:0; display:flex; align-items:center; justify-content:center; overflow:visible; background:transparent; padding:0; }
.tema-egida .logo-empresa img, .tema-labase .logo-empresa img { max-width:110px; max-height:90px; object-fit:contain; background:transparent; }
.tema-finacorp .logo-empresa img { max-width:180px; max-height:70px; object-fit:contain; background:transparent; }

.tema-egida h2 { color:#fff; font-weight:800; font-size:1.35rem; }
.tema-labase h2 { color:#1a1a1a; font-weight:900; font-size:1.35rem; }
.tema-finacorp h2 { color:#fff; font-weight:800; font-size:1.35rem; }
.tema-egida .subtitulo { color:#d4af37; font-size:0.67rem; text-transform:uppercase; letter-spacing:2.5px; margin-top:7px; }
.tema-labase .subtitulo { color:#333; font-size:0.67rem; text-transform:uppercase; letter-spacing:2.5px; margin-top:7px; }
.tema-finacorp .subtitulo { color:rgba(255,255,255,0.75); font-size:0.67rem; text-transform:uppercase; letter-spacing:2px; margin-top:7px; }

.tema-egida .info-body { padding:24px 26px; }
.tema-labase .info-body { padding:24px 26px; background:#fff8dc; }
.tema-finacorp .info-body { padding:24px 26px; background:#fff; }

.tema-egida .cuentas-titulo { display:flex; align-items:center; gap:8px; color:#d4af37; font-weight:700; font-size:0.73rem; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:16px; padding-bottom:9px; border-bottom:1px solid rgba(212,175,55,0.15); }
.tema-labase .cuentas-titulo { display:flex; align-items:center; gap:8px; color:#1a1a1a; font-weight:700; font-size:0.73rem; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:16px; padding-bottom:9px; border-bottom:2px solid rgba(0,0,0,0.15); }
.tema-finacorp .cuentas-titulo { display:flex; align-items:center; gap:8px; color:#1a73e8; font-weight:700; font-size:0.73rem; text-transform:uppercase; letter-spacing:1px; margin-bottom:16px; padding-bottom:9px; border-bottom:2px solid #e8f0fd; }

.tema-egida .cuenta-card, .tema-labase .cuenta-card, .tema-finacorp .cuenta-card {
  border-radius:16px; padding:16px; margin-bottom:10px; position:relative; overflow:hidden;
  display: flex; gap: 14px; align-items: center;
}
.tema-egida .cuenta-card { background:linear-gradient(135deg,#111121,#0e0e1c); border:1px solid rgba(212,175,55,0.12); }
.tema-labase .cuenta-card { background:#fff; border:1px solid rgba(0,0,0,0.1); }
.tema-finacorp .cuenta-card { background:#f8faff; border:1px solid #ddeafc; }

.tema-egida .cuenta-card::before, .tema-labase .cuenta-card::before, .tema-finacorp .cuenta-card::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
}
.tema-egida .cuenta-card::before { background:linear-gradient(180deg,#d4af37,#b8963e); }
.tema-labase .cuenta-card::before { background:linear-gradient(180deg,#1a1a1a,#333); }
.tema-finacorp .cuenta-card::before { background:linear-gradient(180deg,#1a73e8,#0d47a1); }

.tema-egida .cuenta-card img, .tema-labase .cuenta-card img, .tema-finacorp .cuenta-card img {
  width: 44px; height: 44px; background: transparent; border-radius: 0; padding: 0; object-fit: contain;
}
.tema-egida .cuenta-info, .tema-labase .cuenta-info, .tema-finacorp .cuenta-info { flex:1; }
.tema-egida .cuenta-banco { color:#d4af37; font-weight:800; font-size:0.86rem; margin-bottom:6px; }
.tema-labase .cuenta-banco { color:#1a1a1a; font-weight:800; font-size:0.86rem; margin-bottom:6px; }
.tema-finacorp .cuenta-banco { color:#1a73e8; font-weight:800; font-size:0.86rem; margin-bottom:6px; }

.tema-egida .cuenta-detalle, .tema-labase .cuenta-detalle, .tema-finacorp .cuenta-detalle {
  font-size:0.66rem; display:grid; grid-template-columns:1fr 1fr; gap:5px;
}
.tema-egida .cuenta-detalle span { background:rgba(255,255,255,0.04); padding:5px 8px; border-radius:7px; }
.tema-labase .cuenta-detalle span { background:rgba(0,0,0,0.04); padding:5px 8px; border-radius:7px; color:#1a1a1a; }
.tema-finacorp .cuenta-detalle span { background:rgba(26,115,232,0.05); padding:5px 8px; border-radius:7px; }
.tema-egida .cuenta-detalle span strong { color:#a0a0b8; display:block; font-size:0.58rem; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:1px; }
.tema-labase .cuenta-detalle span strong { color:#666; display:block; font-size:0.58rem; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:1px; }
.tema-finacorp .cuenta-detalle span strong { color:#1a73e8; display:block; font-size:0.58rem; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:1px; }

.tema-egida .obs-tag { color:#d4af37; font-size:0.63rem; padding:4px 9px; background:rgba(212,175,55,0.08); border-radius:7px; margin-top:7px; border-left:2px solid #d4af37; }
.tema-labase .obs-tag { color:#1a1a1a; font-size:0.63rem; padding:4px 9px; background:rgba(0,0,0,0.07); border-radius:7px; margin-top:7px; border-left:2px solid #1a1a1a; }
.tema-finacorp .obs-tag { color:#1a73e8; font-size:0.63rem; padding:4px 9px; background:rgba(26,115,232,0.07); border-radius:7px; margin-top:7px; border-left:2px solid #1a73e8; }

.tema-egida .infografia-footer { background:#050508; text-align:center; padding:12px; color:#44445a; font-size:0.6rem; border-top:1px solid rgba(212,175,55,0.1); }
.tema-labase .infografia-footer { background:#e6b800; text-align:center; padding:12px; color:#333; font-size:0.6rem; border-top:1px solid rgba(0,0,0,0.1); }
.tema-finacorp .infografia-footer { background:#f0f4fe; text-align:center; padding:12px; color:#8b9bb8; font-size:0.6rem; border-top:1px solid #ddeafc; }

.tema-egida .cuenta-titular-label { color: #e2e8f0; font-size: 0.72rem; font-weight: 600; margin-bottom: 6px; opacity: 0.85; }
.tema-labase .cuenta-titular-label { color: #333; font-size: 0.72rem; font-weight: 600; margin-bottom: 6px; opacity: 0.85; }
.tema-finacorp .cuenta-titular-label { color: #334155; font-size: 0.72rem; font-weight: 600; margin-bottom: 6px; }

/* ── Gestor de bancos personalizados ── */
.bancos-manager {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  padding: 20px;
  margin-bottom: 28px;
}
.bancos-manager h3 { margin-bottom: 16px; font-size: 0.9rem; color: #cbd5e1; }
.banco-upload-form {
  display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; margin-bottom: 16px;
}
.banco-upload-form input[type="text"] {
  flex: 1; min-width: 130px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 9px 13px; border-radius: 40px;
  color: white; font-family: 'Inter',sans-serif; font-size: 0.8rem;

<script>
// ======================= BANCOS PERSONALIZADOS =======================
// Se guardan en localStorage para persistir entre sesiones
let bancosCustom = JSON.parse(localStorage.getItem('bancosCustom') || '[]');
// { nombre: "Scotiabank", key: "scotiabank", logo: "data:..." }

function saveBancosCustom() {
  localStorage.setItem('bancosCustom', JSON.stringify(bancosCustom));
}

function getBankLogoCustom(nombre) {
  if (!nombre || !bancosCustom.length) return null;
  const k = nombre.toLowerCase().trim();

  // 1. Coincidencia exacta
  let found = bancosCustom.find(b => b.nombre.toLowerCase().trim() === k);
  if (found) return found.logo;

  // 2. El nombre del campo contiene el nombre registrado (o viceversa)
  found = bancosCustom.find(b => {
    const bNom = b.nombre.toLowerCase().trim();
    return k.includes(bNom) || bNom.includes(k);
  });
  if (found) return found.logo;

  // 3. Coincidencia por palabras: si todas las palabras del nombre registrado
  //    están presentes en lo que se escribe (o viceversa)
  found = bancosCustom.find(b => {
    const palabrasRegistradas = b.nombre.toLowerCase().trim().split(/\s+/).filter(p => p.length > 2);
    const palabrasEscritas    = k.split(/\s+/).filter(p => p.length > 2);
    if (!palabrasRegistradas.length || !palabrasEscritas.length) return false;
    return palabrasRegistradas.every(p => palabrasEscritas.some(e => e.includes(p) || p.includes(e))) ||
           palabrasEscritas.every(p => palabrasRegistradas.some(r => r.includes(p) || p.includes(r)));
  });
  return found ? found.logo : null;
}

function renderBancosCustomList() {
  const container = document.getElementById('bancosCustomList');
  if (!bancosCustom.length) {
    container.innerHTML = '<span style="color:#475569;font-size:0.72rem;">Sin bancos personalizados aún.</span>';
    return;
  }
  container.innerHTML = bancosCustom.map((b, i) => `
    <div class="banco-custom-chip">
      <img src="${b.logo}" alt="${b.nombre}">
      <span>${b.nombre}</span>
      <button class="banco-chip-del" data-idx="${i}" title="Eliminar">✕</button>
    </div>
  `).join('');
  container.querySelectorAll('.banco-chip-del').forEach(btn => {
    btn.addEventListener('click', () => {
      bancosCustom.splice(parseInt(btn.dataset.idx), 1);
      saveBancosCustom();
      renderBancosCustomList();
      renderInfografia();
    });
  });
}


function renderAdminLogosPanel() {
  const grid = document.getElementById('adminLogosGrid');
  if (!grid) return;

  if (!bancosCustom.length) {
    grid.innerHTML = '<div class="admin-logo-empty">Sin logos subidos aún.</div>';
    return;
  }

  grid.innerHTML = bancosCustom.map(b => `
    <div class="admin-logo-card">
      <img src="${b.logo}" alt="${b.nombre}">
      <span>${b.nombre}</span>
    </div>
  `).join('');
}

// Preview de imagen al seleccionar
document.getElementById('bancoLogoInput').addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById('bancoPreviewImg');
    img.src = e.target.result;
    img.style.display = 'inline-block';
  };
  reader.readAsDataURL(file);
});

// Agregar banco
document.getElementById('btnAgregarBanco').addEventListener('click', () => {
  const nombre = document.getElementById('bancoNombreInput').value.trim();
  const logoInput = document.getElementById('bancoLogoInput');
  const previewImg = document.getElementById('bancoPreviewImg');

  if (!nombre) { alert('Escribe el nombre del banco.'); return; }
  if (!previewImg.src || previewImg.style.display === 'none') {
    alert('Selecciona un logo para el banco.'); return;
  }

  const key = nombre.toLowerCase().replace(/\s+/g, '');
  // Evitar duplicados
  if (bancosCustom.find(b => b.key === key)) {
    alert('Ya existe un banco con ese nombre.'); return;
  }

  bancosCustom.push({ nombre, key, logo: previewImg.src });
  saveBancosCustom();
  renderBancosCustomList();
  renderAdminLogosPanel();
  renderInfografia();

  // Limpiar form
  document.getElementById('bancoNombreInput').value = '';
  logoInput.value = '';
  previewImg.src = '';
  previewImg.style.display = 'none';
});

// Inicializar lista al cargar
renderBancosCustomList();
renderAdminLogosPanel();

function getBankLogo(bankName) {
  // Primero buscar en bancos personalizados
  const custom = getBankLogoCustom(bankName);
  if (custom) return custom;

  // Luego en predefinidos
  const k = bankName.toLowerCase();
  if (k.includes("bcp"))                          return bancosMap["bcp"].logo;
  if (k.includes("interbank"))                    return bancosMap["interbank"].logo;
  if (k.includes("yape"))                         return bancosMap["yape"].logo;
  if (k.includes("caja") || k.includes("huancayo")) return bancosMap["caja"].logo;
  // Ícono genérico banco

// ======================= GESTIÓN DE USUARIOS (Google Sheets) =======================
// 🔧 REEMPLAZA esta URL con la URL de tu Web App de Apps Script
const GAS_URL = "https://script.google.com/macros/s/AKfycbygr0RB4BTMgfrupLVyfGaGnrag2v9F72rhPMHuM7hW1GXeq7afUl1icv1jtdoRBv84/exec";

let currentUser = null;
let usersCache  = [];   // caché local para la tabla

function escapeHtml(str) {
  return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');
}

// Llama al Apps Script con POST (evita CORS)
async function gasCall(payload) {
  const res = await fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify(payload)
  });
  if (!res.ok) throw new Error("Error HTTP " + res.status);
  return res.json();
}

// ── Carga usuarios desde GAS y actualiza la tabla ───────────
async function loadAndRenderUserTable() {
  try {
    const data = await gasCall({ action: "listUsers" });
    if (data.ok) {
      usersCache = data.users || [];
    } else {
      usersCache = [];
    }
  } catch(e) {
    usersCache = [];
  }
  renderUserTable();
}

// ── Tabla de usuarios (solo ADMIN) ──────────────────────────
function renderUserTable() {
  const tbody = document.getElementById("userTableBody");
  if (!tbody) return;

  tbody.innerHTML = usersCache.map((u) => `
    <tr>
      <td>${escapeHtml(u.fullname || "")}</td>
      <td>${escapeHtml(u.username || "")}</td>
      <td>
        <span class="user-password-text">
          ${escapeHtml(u.password || u.contrasena || u.pass || "—")}
        </span>
      </td>
      <td>${escapeHtml(u.role || "USUARIO")}</td>
      <td>
        <button class="delete-user-btn" data-username="${escapeHtml(u.username || "")}">
          Eliminar
        </button>
      </td>
    </tr>
  `).join("") || `<tr><td colspan="5" style="color:#64748b;">Sin usuarios</td></tr>`;

  document.querySelectorAll(".delete-user-btn").forEach(btn => {
    btn.addEventListener("click", async () => {
      const uname = btn.dataset.username;
      if (uname === currentUser?.username) {
        alert("No puedes eliminarte a ti mismo.");
        return;
      }
      if (!confirm("¿Eliminar usuario " + uname + "?")) return;

      btn.textContent = ".";
      try {
        await gasCall({ action: "deleteUser", username: uname });
        await loadAndRenderUserTable();
      } catch(e) {
        alert("Error al eliminar: " + e.message);
      }
    });
  });
}

async function doLogin() {
  const username = document.getElementById("loginUser").value.trim();
  const password = document.getElementById("loginPass").value;
  const errorEl  = document.getElementById("loginError");
  const loginBtn = document.getElementById("loginBtn");

  if (!username || !password) {
    errorEl.textContent = "Por favor completa todos los campos.";
    return;
  }

  loginBtn.textContent = "Verificando...";
  loginBtn.disabled = true;
  errorEl.textContent = "";

  try {
    const data = await gasCall({ action: "login", username, password });
    if (data.ok) {
      currentUser = data.user;
      document.getElementById("loginContainer").style.display = "none";
      document.getElementById("appContainer").style.display  = "block";
      document.getElementById("userInfo").textContent = "👤 " + data.user.fullname + " · " + data.user.role;
      if (data.user.role === "ADMIN") {
        document.getElementById("adminPanel").style.display = "block";
        loadAndRenderUserTable();
      }
      initApp();
    } else {
      errorEl.textContent = data.error || "Usuario o contraseña incorrectos.";
      document.getElementById("loginPass").value = "";
    }
  } catch(e) {
    errorEl.textContent = "Error de conexión. Verifica la URL del script.";
  } finally {
    loginBtn.textContent = "Iniciar sesión";
    loginBtn.disabled = false;
  }
}

function doLogout() {
  currentUser = null;
  document.getElementById("appContainer").style.display  = "none";
  document.getElementById("loginContainer").style.display = "flex";
  document.getElementById("loginUser").value = "";
  document.getElementById("loginPass").value = "";
  document.getElementById("loginError").textContent = "";
  document.getElementById("adminPanel").style.display = "none";
}

// ======================= EDITOR DE CUENTAS =======================
function getBancosDatalist() {
  // Bancos predefinidos + personalizados para el datalist
  const predefinidos = ["BCP", "Interbank", "Yape", "Caja Huancayo", "BBVA", "Scotiabank", "BanBif", "Banco de la Nacion", "Mibanco", "Pichincha"];
  const custom = bancosCustom.map(b => b.nombre);
  const todos = [...new Set([...predefinidos, ...custom])];
  return `<datalist id="bancosSugeridos">${todos.map(b => `<option value="${b}">`).join('')}</datalist>`;
}

function renderCuentasEditor() {
  const empresa = empresasState[empresaActual];
  const container = document.getElementById("cuentasEditor");
  container.innerHTML = getBancosDatalist();

  empresa.cuentas.forEach((c, idx) => {
    const div = document.createElement("div");
    div.className = "cuenta-editor-item";
    div.innerHTML = `
      <button class="btn-eliminar-cuenta" data-idx="${idx}" title="Eliminar">✕</button>
      <div class="grid-cuenta-editor">
        <div class="field-small">
          <label>Banco</label>
          <input type="text" list="bancosSugeridos" data-field="banco" data-idx="${idx}" value="${escapeHtml(c.banco)}" placeholder="Escribe o elige un banco">
        </div>
        <div class="field-small">
          <label>Tipo</label>
          <input type="text" data-field="tipo" data-idx="${idx}" value="${escapeHtml(c.tipo)}">
        </div>
        <div class="field-small">
          <label>Moneda</label>
          <input type="text" data-field="moneda" data-idx="${idx}" value="${escapeHtml(c.moneda)}">
        </div>
        <div class="field-small">
          <label>Número</label>
          <input type="text" data-field="numero" data-idx="${idx}" value="${escapeHtml(c.numero)}">
        </div>
        <div class="field-small" style="grid-column:1/-1">
          <label>CCI</label>
          <input type="text" data-field="cci" data-idx="${idx}" value="${escapeHtml(c.cci)}">
        </div>
        <div class="field-small" style="grid-column:1/-1">
          <label>Titular</label>
          <input type="text" data-field="titular" data-idx="${idx}" value="${escapeHtml(c.titular)}">
        </div>
        <div class="field-small" style="grid-column:1/-1">
          <label>Observación</label>
          <textarea data-field="observacion" data-idx="${idx}">${escapeHtml(c.observacion)}</textarea>
        </div>
      </div>
    `;
    container.appendChild(div);
  });

  // Listeners inputs — actualiza infografía en tiempo real
  container.querySelectorAll("input, textarea").forEach(el => {
    const actualizar = (e) => {
      const idx = parseInt(e.target.dataset.idx);
      const field = e.target.dataset.field;
      empresasState[empresaActual].cuentas[idx][field] = e.target.value;
      renderInfografia();
      updateStats();
    };
    el.addEventListener("input",  actualizar);
    el.addEventListener("change", actualizar); // captura selección del datalist
  });

  // Listeners eliminar
  container.querySelectorAll(".btn-eliminar-cuenta").forEach(btn => {
    btn.addEventListener("click", () => {
      const idx = parseInt(btn.dataset.idx);
      empresasState[empresaActual].cuentas.splice(idx, 1);
      renderCuentasEditor();
      renderInfografia();
      updateStats();
    });
  });
}

// ======================= INFOGRAFÍA =======================
function renderInfografia() {
  const empresa = empresasState[empresaActual];
  const tema = empresa.tema;
  const logo = LOGOS[empresaActual];

  const cuentasHTML = empresa.cuentas.map(c => {
    const logoSrc = getBankLogo(c.banco);
    const obsHTML = c.observacion ? `<div class="obs-tag">📌 ${escapeHtml(c.observacion)}</div>` : "";
    const cciHTML = c.cci ? `<span style="grid-column:1/-1"><strong>CCI</strong>${escapeHtml(c.cci)}</span>` : "";
    const isYape = c.banco.toLowerCase().includes("yape");
    return `
      <div class="cuenta-card">
        <img src="${logoSrc}" alt="${escapeHtml(c.banco)}" style="width:44px;height:44px;object-fit:contain;border-radius:10px;background:transparent;padding:0;">
        <div class="cuenta-info">
          <div class="cuenta-banco">${escapeHtml(c.banco)}</div>
          <div class="cuenta-titular-label">${escapeHtml(c.titular)}</div>
          <div class="cuenta-detalle">
            <span><strong>Tipo</strong>${escapeHtml(c.tipo)}</span>
            <span><strong>Moneda</strong>${escapeHtml(c.moneda)}</span>
            ${c.numero ? `<span style="grid-column:1/-1"><strong>N° Cuenta</strong>${escapeHtml(c.numero)}</span>` : ""}
            ${cciHTML}
          </div>
          ${obsHTML}
        </div>
      </div>
    `;
  }).join("");

  const html = `
    <div class="${tema}">
      <div class="infografia-header">
        <div class="logo-empresa">
          <img src="${logo}" alt="${escapeHtml(empresa.nombre)}" onerror="this.style.display='none'">
        </div>
        <h2>${escapeHtml(empresa.nombre)}</h2>
        <div class="subtitulo">${escapeHtml(empresa.subtitulo)}</div>
      </div>
      <div class="info-body">
        <div class="cuentas-titulo">🏦 Cuentas Bancarias Habilitadas</div>
        ${cuentasHTML}
      </div>
      <div class="infografia-footer">
        Documento generado por LexSuite · ${new Date().toLocaleDateString("es-PE", {day:"2-digit",month:"long",year:"numeric"})}
      </div>
    </div>
  `;

  document.getElementById("infografiaPreview").innerHTML = html;
}

// ======================= BADGES =======================
function renderBadges() {
  const container = document.getElementById("empresaBadges");
  const empresas = [
    { key: "egida",    label: "Egida Jurídica",  cls: "badge-egida" },
    { key: "labase",   label: "La Base Cowork",  cls: "badge-labase" },
    { key: "finacorp", label: "Finacorp",         cls: "badge-finacorp" }
  ];
  container.innerHTML = empresas.map(e => `
    <div class="empresa-badge ${e.cls} ${empresaActual === e.key ? "active" : ""}" data-key="${e.key}">
      ${e.label}
    </div>
  `).join("");
  container.querySelectorAll(".empresa-badge").forEach(badge => {
    badge.addEventListener("click", () => {
      empresaActual = badge.dataset.key;
      document.getElementById("empresaSelector").value = empresaActual;
      renderBadges();
      renderCuentasEditor();
      renderInfografia();
      updateStats();
    });
  });
}

function updateStats() {
  document.getElementById("stat-cuentas").textContent =
    empresasState[empresaActual].cuentas.length;
}

// ======================= EXPORT =======================
document.getElementById("exportBtn").addEventListener("click", () => {
  const target = document.getElementById("infografiaPreview").firstElementChild;
  if (!target) return;
  html2canvas(target, { scale: 2, backgroundColor: null, useCORS: true }).then(canvas => {
    const link = document.createElement("a");
    link.download = `infografia-${empresaActual}-${Date.now()}.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
  });
});

// ======================= CREAR USUARIO (Google Sheets) =======================
document.getElementById("createUserBtn").addEventListener("click", async () => {
  const fn   = document.getElementById("newFullname").value.trim();
  const un   = document.getElementById("newUsername").value.trim();
  const pw   = document.getElementById("newPassword").value;
  const role = document.getElementById("newRole").value;
  const btn  = document.getElementById("createUserBtn");

  if (!fn || !un || !pw) { alert("Completa todos los campos."); return; }

  btn.textContent = "Guardando...";
  btn.disabled = true;
  try {
    const data = await gasCall({ action: "createUser", fullname: fn, username: un, password: pw, role });
    if (data.ok) {
      document.getElementById("newFullname").value = "";
      document.getElementById("newUsername").value = "";
      document.getElementById("newPassword").value = "";
      await loadAndRenderUserTable();
    } else {
      alert("Error: " + (data.error || "No se pudo crear el usuario."));
    }
  } catch(e) {
    alert("Error de conexión: " + e.message);
  } finally {
    btn.textContent = "➕ Crear";
    btn.disabled = false;
  }
});

// ======================= LOGIN EVENTS =======================
document.getElementById("loginBtn").addEventListener("click", doLogin);
document.getElementById("logoutBtn").addEventListener("click", doLogout);
document.getElementById("loginPass").addEventListener("keydown", e => { if(e.key==="Enter") doLogin(); });
document.getElementById("loginUser").addEventListener("keydown", e => { if(e.key==="Enter") doLogin(); });

// ======================= EMPRESA SELECTOR =======================
document.getElementById("empresaSelector").addEventListener("change", (e) => {
  empresaActual = e.target.value;
  renderBadges();
  renderCuentasEditor();
  renderInfografia();
  updateStats();
});

// ======================= AGREGAR CUENTA =======================
document.getElementById("agregarCuentaBtn").addEventListener("click", () => {
  empresasState[empresaActual].cuentas.push({
    banco: "Nuevo Banco", tipo: "Cuenta Corriente", moneda: "PEN",
    numero: "", cci: "", titular: "", observacion: ""
  });
  renderCuentasEditor();
  renderInfografia();
  updateStats();
});

// ======================= INIT =======================
function initApp() {
  renderBadges();
  renderCuentasEditor();
  renderInfografia();
  updateStats();
}

</script>
</body>
</html>
